# Fly.io — one image, two process groups (web + worker). See
# docs/superpowers/specs/2026-07-01-cloud-publishing-architecture-design.md §5 and docs/deploy.md.
#
# PLACEHOLDERS to set before `fly deploy`:
#   app            → your Fly app name (`fly apps create <name>`)
#   primary_region → your region (`fly platform regions`)
app = "youtube-playlist-summaries"
# iad (Ashburn, VA) — chosen to sit next to the prod Supabase project, which is in AWS us-east-1.
# This is a latency decision, not a preference: the worker issues many small round trips per job
# (claim_next_job, lease heartbeats every leaseSeconds/3, spend_ledger reserve/release, complete),
# so a cross-continent hop of ~60-70ms compounds per job. Keep this region in the same locality as
# the Supabase project; if that project ever moves, move this with it.
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# NEXT_PUBLIC_* are inlined into the browser bundle at `next build` time, so they must be present
# during the Docker build — `fly secrets` are runtime-only and are absent then. Fly passes these
# [build.args] to the build automatically on every `fly deploy`. Both values are PUBLIC (the anon
# key ships to every browser and is gated by RLS), so committing them here is safe and standard.
# The service_role key is deliberately NOT here — it stays a runtime-only `fly secrets` value.
[build.args]
  NEXT_PUBLIC_SUPABASE_URL = "https://uykwcybxqgewmbltroxf.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5a3djeWJ4cWdld21ibHRyb3hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NjcwNDksImV4cCI6MjEwMDE0MzA0OX0.i_JGRLmROGUgJmt1q8ShLkNzfE7FDSN5a8i1vsz5SCw"

# Two commands off the same image. Default CMD (web) is overridden per group here.
# These invoke node DIRECTLY, not npm scripts: the runtime stage of the multi-stage Dockerfile
# (2026-07-19) ships only Next's standalone output plus a bundled worker, so neither `next start`
# nor `ts-node` exists in the image any more. `server.js` is the standalone server Next emits;
# `worker.js` is the esbuild bundle of worker/main.ts.
[processes]
  web = "node server.js"
  worker = "node worker.js"

# HTTP only for the web group; the worker is a headless job loop (no ports).
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

# Graceful drain: worker traps SIGTERM (worker/main.ts) → stops claiming, finishes the in-flight
# job, exits. Give it time before SIGKILL so a deploy/rollout doesn't strand a reservation
# (the §2.4b crash-residual mitigation).
kill_signal = "SIGTERM"
kill_timeout = "120s"

# web machine — light.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["web"]

# worker machine — headroom for Chromium (PDF) + concurrent Gemini jobs.
[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
  processes = ["worker"]
